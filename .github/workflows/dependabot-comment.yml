name: Dependabot ritual reminder

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  comment:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Post ritual instructions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "## Pre-merge ritual

          Цей PR оновлює \`go.mod\` / \`go.sum\`, але **не** перегенерує \`vendor/\`. CI step \`Verify vendor is in sync\` впаде, поки vendor не синкнуто.

          **Перед merge:**

          \`\`\`sh
          gh pr checkout $PR_NUMBER
          make tidy
          git commit -am 'deps: sync vendor'
          git push
          \`\`\`

          Після цього CI стане зеленим — можна merge.

          _Auto-generated by \`.github/workflows/dependabot-comment.yml\`._"
