name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: Vet
        run: go vet -mod=vendor ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: --mod=vendor

      - name: Test
        run: go test -mod=vendor ./...

      - name: Build
        run: go build -mod=vendor -o /dev/null ./cmd/api
