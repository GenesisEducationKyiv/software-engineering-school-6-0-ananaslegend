name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: Verify vendor is in sync
        run: |
          go mod tidy
          go mod vendor
          if ! git diff --exit-code go.mod go.sum vendor/; then
            echo "::error::go.mod / go.sum / vendor/ out of sync. Run 'make tidy' locally and commit."
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
        env:
          GOFLAGS: -mod=vendor

      - name: Test
        run: go test -mod=vendor ./...

      - name: Build
        run: go build -mod=vendor -o /dev/null ./cmd/api
