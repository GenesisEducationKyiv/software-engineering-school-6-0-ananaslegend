<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New release: {{.RepoFullName}}</title>
</head>
<body style="margin:0;padding:0;background:#0f172a;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0f172a;padding:48px 24px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;text-align:center;">

          <!-- Wordmark -->
          <tr>
            <td align="center" style="padding-bottom:36px;">
              <span style="font-size:20px;font-weight:800;color:#ffffff;font-family:system-ui,-apple-system,sans-serif;letter-spacing:-0.5px;">repo<span style="color:#60a5fa;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;text-decoration-color:#60a5fa;">see</span>tory</span>
            </td>
          </tr>

          <!-- Icon -->
          <tr>
            <td align="center" style="padding-bottom:16px;">
              <div style="font-size:44px;line-height:1;">🔔</div>
            </td>
          </tr>

          <!-- Heading -->
          <tr>
            <td align="center" style="padding-bottom:10px;">
              <h1 style="margin:0;font-size:22px;font-weight:800;color:#ffffff;letter-spacing:-0.5px;">New Release Published</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <p style="margin:0;font-size:14px;color:#94a3b8;line-height:1.6;">
                <strong style="color:#e2e8f0;">{{.RepoFullName}}</strong> just published version <strong style="color:#60a5fa;">{{.ReleaseTag}}</strong>.
              </p>
            </td>
          </tr>

          <!-- CTA -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <a href="{{.ReleaseURL}}"
                 style="display:inline-block;background:#2563eb;color:#ffffff;font-size:14px;font-weight:600;text-decoration:none;padding:11px 28px;border-radius:8px;">
                View release →
              </a>
            </td>
          </tr>

          <!-- Footer details -->
          <tr>
            <td align="center">
              <p style="margin:0 0 6px;font-size:12px;color:#475569;">Or copy this link:</p>
              <p style="margin:0 0 16px;font-size:12px;font-family:ui-monospace,'Cascadia Code',monospace;">
                <a href="{{.ReleaseURL}}" style="color:#60a5fa;word-break:break-all;">{{.ReleaseURL}}</a>
              </p>
              <p style="margin:0;font-size:12px;color:#475569;">
                Don't want notifications? <a href="{{.UnsubscribeURL}}" style="color:#60a5fa;">Unsubscribe</a>
              </p>
            </td>
          </tr>

          <!-- Footer branding -->
          <tr>
            <td align="center" style="padding-top:36px;">
              <span style="font-size:12px;font-weight:700;color:#334155;">repo<span style="color:#1d4ed8;">see</span>tory</span>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
