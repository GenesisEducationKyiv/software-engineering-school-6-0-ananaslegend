services:
  postgres:
    ports:
      - "5432:5432"
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: postgres
    volumes:
      - pgdatatest:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"

  migrate:
    image: migrate/migrate:latest
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://postgres:pass@postgres:5432/postgres?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:pass@postgres:5432/postgres?sslmode=disable
      APP_BASE_URL: http://localhost:8080
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_TLS_POLICY: none
      SMTP_FROM: noreply@reposeetory.local
      LOG_PRETTY: "true"
      LOG_LEVEL: info
    env_file:
      - path: .env
        required: false
    depends_on:
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

volumes:
  pgdatatest:
